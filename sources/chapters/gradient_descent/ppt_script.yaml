slide_script:
  schema_version: 1
  chapter_id: "gradient_descent"
  title: "梯度下降与优化"
  source_lesson_plan: "sources/chapters/gradient_descent/content.yaml"
  constraints:
    - "只转换 lesson plan，不新增教学内容。"
    - "不输出最终版式、坐标、颜色、字体。"
    - "保留 reveal_steps 作为 PPT skill 的唯一分步揭示依据。"
  visual_verdict:
    total_score: 91
    pass_threshold: 88
    verdict: "通过。slide script 已把课堂内容拆成可逐步揭示的演示脚本，最终版式由 PPT skill 负责。"
    scores:
      visual_simplicity: 18
      teaching_rhythm: 19
      reveal_quality: 19
      cognitive_guidance: 18
      formula_clarity: 8
      classroom_usability: 9
    risks:
      - "真实 PPT 动画由物理 reveal 页模拟，文件页数会多于逻辑页。"
      - "LaTeX 公式以文本形式进入 PPT，后续可接公式渲染器进一步美化。"
    repair_actions:
      - "保持每页只讲一个问题，不把讲稿搬到画面上。"
      - "公式页只放核心公式，符号解释放在讲者备注。"
  slides:
    - slide_id: "S01"
      slide_type: "hook"
      title: "模型错了，怎么办？"
      teaching_purpose: "制造驱动问题，让学生意识到 loss 还不能回答参数方向。"
      content: "参数往哪改？"
      reveal_steps:
        - step_id: "S01-R1"
          kind: "question"
          text: "先别给公式"
        - step_id: "S01-R2"
          kind: "idea"
          text: "损失告诉错多重"
        - step_id: "S01-R3"
          kind: "idea"
          text: "方向还不知道"
      formula_spec: []
      visual_intent: "一个居中的大问题，逐步揭示认知缺口。"
      notes: "先让学生停一下。我们训练模型时，看到 loss 变大，只知道它错了，但还不知道参数应该往左还是往右改。今天这节课就解决这个问题。"
    - slide_id: "S02"
      slide_type: "conflict"
      title: "只知道错，不够"
      teaching_purpose: "区分损失数值和更新方向。"
      content: "loss 不是方向盘。"
      reveal_steps:
        - step_id: "S02-R1"
          kind: "idea"
          text: "loss 是分数"
        - step_id: "S02-R2"
          kind: "idea"
          text: "分数没有方向"
        - step_id: "S02-R3"
          kind: "idea"
          text: "训练需要方向"
      formula_spec: []
      visual_intent: "左边保留短句，右边逐步出现冲突要点。"
      notes: "这里制造认知冲突。loss 像考试分数，只告诉你这次差多少，却不直接告诉你下一步怎么改。梯度的角色就要登场了。"
    - slide_id: "S03"
      slide_type: "insight"
      title: "梯度给方向"
      teaching_purpose: "给出本节课的核心机制。"
      content: "误差变成改法。"
      reveal_steps:
        - step_id: "S03-R1"
          kind: "idea"
          text: "看局部斜率"
        - step_id: "S03-R2"
          kind: "idea"
          text: "反方向下降"
        - step_id: "S03-R3"
          kind: "idea"
          text: "梯度是方向"
      formula_spec: []
      visual_intent: "高亮核心句，让学生只记住一个机制。"
      notes: "关键机制揭示：梯度不是答案，而是当前位置附近最敏感的变化方向。要下降，就沿负梯度走。"
    - slide_id: "S04"
      slide_type: "intuition"
      title: "像下山，但别跑"
      teaching_purpose: "用类比解释学习率。"
      content: "步子太大会摔。"
      reveal_steps:
        - step_id: "S04-R1"
          kind: "idea"
          text: "坡度给方向"
        - step_id: "S04-R2"
          kind: "idea"
          text: "步长要合适"
        - step_id: "S04-R3"
          kind: "idea"
          text: "太大就震荡"
      formula_spec: []
      visual_intent: "一侧类比，一侧揭示学习率的三种结果。"
      notes: "用下山类比。坡度告诉你往哪里低，学习率决定你每一步迈多大。步子小慢，步子大可能越过谷底。"
    - slide_id: "S05"
      slide_type: "formalization"
      title: "把直觉写成公式"
      teaching_purpose: "完成一维二次函数到更新公式的数学表达。"
      content: "核心更新式"
      reveal_steps:
        - step_id: "S05-R1"
          kind: "formula"
          text: "目标函数"
          formula_ref: "loss_1d"
        - step_id: "S05-R2"
          kind: "formula"
          text: "导数"
          formula_ref: "grad_1d"
        - step_id: "S05-R3"
          kind: "formula"
          text: "更新"
          formula_ref: "update_1d"
      formula_spec:
        - formula_id: "loss_1d"
          latex: "L(w)=(w-3)^2+1"
          spoken_explanation: "L 是当前参数 w 带来的损失。"
        - formula_id: "grad_1d"
          latex: "\\frac{\\partial L}{\\partial w}=2(w-3)"
          spoken_explanation: "偏导数表示当前位置处损失变化最快的方向。"
        - formula_id: "update_1d"
          latex: "w_{t+1}=w_t-\\eta\\frac{\\partial L}{\\partial w}"
          spoken_explanation: "减号表示沿下降方向走，eta 控制步长。"
      visual_intent: "公式居中逐步出现，每次只出现一个公式。"
      notes: "公式必须慢讲。L 是损失，w 是参数，eta 是学习率，偏导数是当前参数处损失变化最快的方向。减号表示沿下降方向走。"
    - slide_id: "S06"
      slide_type: "ai_mapping"
      title: "神经网络也这样学"
      teaching_purpose: "把数学公式映射回 AI 模型训练循环。"
      content: "GPT 也在降 loss。"
      reveal_steps:
        - step_id: "S06-R1"
          kind: "mapping"
          text: "预测一个输出"
        - step_id: "S06-R2"
          kind: "mapping"
          text: "计算 loss"
        - step_id: "S06-R3"
          kind: "mapping"
          text: "更新参数"
      formula_spec: []
      visual_intent: "流程式映射，不加入新优化算法。"
      notes: "把数学接回 AI。真实模型参数很多，不是一个 w，而是 theta。神经网络、GPT 的训练也离不开这条抽象流程：预测、算损失、求梯度、更新。"
    - slide_id: "S07"
      slide_type: "recap"
      title: "今天只记一条线"
      teaching_purpose: "用最少概念收束本节课。"
      content: "错，变成方向。"
      reveal_steps:
        - step_id: "S07-R1"
          kind: "idea"
          text: "loss：错多少"
        - step_id: "S07-R2"
          kind: "idea"
          text: "gradient：往哪改"
        - step_id: "S07-R3"
          kind: "idea"
          text: "eta：改多大"
      formula_spec: []
      visual_intent: "中心高亮三行总结。"
      notes: "收束时不要加新知识。只让学生带走这一条线：loss 给反馈，gradient 给方向，learning rate 给步长。"
    - slide_id: "S08"
      slide_type: "exercise"
      title: "先猜，再运行"
      teaching_purpose: "把公式和实验曲线建立联系。"
      content: "eta 变大，会怎样？"
      reveal_steps:
        - step_id: "S08-R1"
          kind: "check"
          text: "eta=0.05"
        - step_id: "S08-R2"
          kind: "check"
          text: "eta=0.2"
        - step_id: "S08-R3"
          kind: "check"
          text: "eta=1.05"
      formula_spec: []
      visual_intent: "预测题形式，留出老师和学生互动空间。"
      notes: "练习不要直接给答案。先让学生预测三个学习率的曲线，再打开 notebook 验证。目标是让学生把公式和图像联系起来。"
