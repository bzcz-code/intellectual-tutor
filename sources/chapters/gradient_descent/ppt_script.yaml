slide_script:
  schema_version: 2
  chapter_id: "gradient_descent"
  title: "梯度下降与优化"
  source_lesson_plan: "sources/chapters/gradient_descent/content.yaml"
  constraints:
    - "只转换 lesson plan，不新增未经审核的教学结论。"
    - "允许讲义型页面承载解释文字、图表、代码和运行结果。"
    - "reveal_steps 指向内容块，由 PPT skill 决定使用原生动画或物理页兜底。"
  visual_verdict:
    total_score: 92
    pass_threshold: 88
    verdict: "通过。slide script 已从极简演讲稿改为讲义型页面脚本，学生课后只看 PPT 也能复习核心机制。"
    scores:
      content_self_contained: 19
      visual_explanation: 18
      code_result_clarity: 14
      formula_clarity: 14
      teaching_rhythm: 13
      classroom_usability: 14
    risks:
      - "页面信息密度高于极简版，教师课堂讲授时需要控制停顿和提问节奏。"
      - "PPT 原生动画由底层 XML 注入，若验证失败将回退为物理页 reveal。"
    repair_actions:
      - "每页保留一个主问题，图表、代码和公式都服务这个问题。"
      - "代码块只展示最短可运行片段，详细实验仍放在 notebook。"
  slides:
    - slide_id: "S01"
      slide_type: "hook"
      title: "模型错了以后，参数为什么知道往哪改？"
      teaching_purpose: "用训练闭环建立整节课的驱动问题。"
      layout: "title_overview"
      content_blocks:
        - block_id: "S01-Q"
          kind: "callout"
          text: "核心问题：loss 只告诉我们错得多严重，梯度才告诉我们往哪改。"
        - block_id: "S01-B"
          kind: "bullet_list"
          items:
            - "预测输出和真实标签不一致，先得到一个损失值。"
            - "损失值本身没有方向，不能直接告诉参数该增大还是减小。"
            - "梯度把误差信号转成局部改进方向，学习率决定迈多大一步。"
        - block_id: "S01-D"
          kind: "diagram"
          asset_id: "training_loop"
          caption: "训练不是记答案，而是不断沿着让 loss 下降的方向更新参数。"
      reveal_steps:
        - step_id: "S01-R1"
          kind: "question"
          target_ref: "S01-Q"
        - step_id: "S01-R2"
          kind: "bullet_list"
          target_ref: "S01-B"
        - step_id: "S01-R3"
          kind: "diagram"
          target_ref: "S01-D"
      formula_spec: []
      visual_intent: "左侧给出课堂驱动问题，右侧显示训练闭环结构图，形成可复习的第一页。"
      notes: "先不要急着写公式。让学生意识到 loss 是反馈，不是行动方案；梯度下降解决的是从反馈到行动的桥。"
    - slide_id: "S02"
      slide_type: "conflict"
      title: "loss 是分数，不是方向盘"
      teaching_purpose: "区分损失数值和参数更新方向。"
      layout: "two_column"
      content_blocks:
        - block_id: "S02-P"
          kind: "paragraph"
          text: "把模型训练想成考试订正：分数能说明这次错得多重，但不能自动告诉你下一题应该改哪个知识点。模型也是如此，loss 是一个标量，它需要通过导数或梯度转化为参数空间里的方向。"
        - block_id: "S02-B"
          kind: "bullet_list"
          items:
            - "loss 越大，只表示当前参数效果越差。"
            - "参数更新需要知道每个参数改变后 loss 如何变化。"
            - "梯度是当前位置附近最敏感的变化方向。"
        - block_id: "S02-D"
          kind: "diagram"
          asset_id: "parameter_update"
          caption: "从 loss 到 gradient，再到 eta 控制的参数更新。"
      reveal_steps:
        - step_id: "S02-R1"
          kind: "paragraph"
          target_ref: "S02-P"
        - step_id: "S02-R2"
          kind: "bullet_list"
          target_ref: "S02-B"
        - step_id: "S02-R3"
          kind: "diagram"
          target_ref: "S02-D"
      formula_spec: []
      visual_intent: "左侧保留详细解释，右侧显示参数更新映射图，避免只靠口播。"
      notes: "重点追问：如果只知道错了 8 分，你知道参数应该加还是减吗？这能自然引出导数符号。"
    - slide_id: "S03"
      slide_type: "insight"
      title: "先把训练压缩成一个一维玩具模型"
      teaching_purpose: "用可画图的一维损失函数承接后续推导。"
      layout: "diagram_explanation"
      content_blocks:
        - block_id: "S03-P"
          kind: "paragraph"
          text: "真实神经网络有大量参数，但课堂上先看一个参数 w。这个玩具模型保留了训练主线：参数决定损失，导数描述当前位置附近的损失变化，更新让参数向低损失区域移动。"
        - block_id: "S03-F1"
          kind: "formula"
          formula_ref: "loss_1d"
        - block_id: "S03-Plot"
          kind: "plot"
          asset_id: "loss_curve"
          caption: "二次损失曲线把“往低处走”变成可观察的几何动作。"
      reveal_steps:
        - step_id: "S03-R1"
          kind: "paragraph"
          target_ref: "S03-P"
        - step_id: "S03-R2"
          kind: "formula"
          target_ref: "S03-F1"
        - step_id: "S03-R3"
          kind: "plot"
          target_ref: "S03-Plot"
      formula_spec:
        - formula_id: "loss_1d"
          latex: "L(w)=(w-3)^2+1"
          spoken_explanation: "w 是一个参数，L(w) 是这个参数带来的损失，最低点在 w=3。"
      visual_intent: "正文解释为什么要降维，右侧显示损失函数曲线。"
      notes: "强调这是玩具模型，不是假装真实模型只有一个参数；它是为了让学生看见梯度下降的几何含义。"
    - slide_id: "S04"
      slide_type: "formalization"
      title: "导数符号决定下一步方向"
      teaching_purpose: "完成从导数到负梯度更新的数学表达。"
      layout: "formula_lab"
      content_blocks:
        - block_id: "S04-P"
          kind: "paragraph"
          text: "如果当前位置 w 小于 3，导数为负，减去负导数会让 w 增大；如果 w 大于 3，导数为正，减去正导数会让 w 减小。这个减号正是“沿下降方向走”的数学写法。"
        - block_id: "S04-F1"
          kind: "formula"
          formula_ref: "grad_1d"
        - block_id: "S04-F2"
          kind: "formula"
          formula_ref: "update_1d"
        - block_id: "S04-C"
          kind: "callout"
          text: "学习率 eta 不是装饰项，它决定每次相信梯度多少。"
      reveal_steps:
        - step_id: "S04-R1"
          kind: "paragraph"
          target_ref: "S04-P"
        - step_id: "S04-R2"
          kind: "formula"
          target_ref: "S04-F1"
        - step_id: "S04-R3"
          kind: "formula"
          target_ref: "S04-F2"
        - step_id: "S04-R4"
          kind: "callout"
          target_ref: "S04-C"
      formula_spec:
        - formula_id: "grad_1d"
          latex: "\\frac{\\partial L}{\\partial w}=2(w-3)"
          spoken_explanation: "偏导数给出当前位置处损失随 w 变化的方向和敏感程度。"
        - formula_id: "update_1d"
          latex: "w_{t+1}=w_t-\\eta\\frac{\\partial L}{\\partial w}"
          spoken_explanation: "减号表示走下降方向，eta 控制步长。"
      visual_intent: "公式和解释并列，符号含义直接在页面上出现，便于学生课后复习。"
      notes: "不要只让学生抄公式。让他们口头解释减号和 eta 的角色。"
    - slide_id: "S05"
      slide_type: "intuition"
      title: "学习率太小、合适、太大，曲线完全不同"
      teaching_purpose: "用程序生成曲线展示学习率对训练动态的影响。"
      layout: "code_result"
      content_blocks:
        - block_id: "S05-Code"
          kind: "code_block"
          language: "python"
          code: |
            learning_rates = [0.05, 0.2, 1.05]
            results = {eta: run_descent(eta) for eta in learning_rates}
            for eta, (_, losses) in results.items():
                print(eta, losses[:5])
        - block_id: "S05-Out"
          kind: "output_block"
          text: "观察：eta=0.05 下降慢；eta=0.2 较快收敛；eta=1.05 会震荡或不稳定。"
        - block_id: "S05-Plot"
          kind: "plot"
          asset_id: "learning_rate_trajectories"
          caption: "同一个损失函数，不同学习率会产生完全不同的训练轨迹。"
      reveal_steps:
        - step_id: "S05-R1"
          kind: "code_block"
          target_ref: "S05-Code"
        - step_id: "S05-R2"
          kind: "plot"
          target_ref: "S05-Plot"
        - step_id: "S05-R3"
          kind: "output_block"
          target_ref: "S05-Out"
      formula_spec: []
      visual_intent: "左侧代码和观察结果，右侧曲线图，形成代码-结果-解释闭环。"
      notes: "先让学生预测三种 eta 的形状，再展示图。目标是让公式和图像互相验证。"
    - slide_id: "S06"
      slide_type: "ai_mapping"
      title: "从一个 w 推广到真实模型的 theta"
      teaching_purpose: "把一维更新映射回多参数 AI 模型训练。"
      layout: "diagram_explanation"
      content_blocks:
        - block_id: "S06-P"
          kind: "paragraph"
          text: "真实模型的参数不是一个数，而是一个向量 theta。训练循环仍然相同：预测、计算 loss、求梯度、按学习率更新参数，然后再次预测。区别只是梯度从一个导数变成了对所有参数的偏导数组合。"
        - block_id: "S06-F"
          kind: "formula"
          formula_ref: "update_theta"
        - block_id: "S06-D"
          kind: "diagram"
          asset_id: "training_loop"
          caption: "多参数模型仍遵守同一条训练主线。"
      reveal_steps:
        - step_id: "S06-R1"
          kind: "paragraph"
          target_ref: "S06-P"
        - step_id: "S06-R2"
          kind: "formula"
          target_ref: "S06-F"
        - step_id: "S06-R3"
          kind: "diagram"
          target_ref: "S06-D"
      formula_spec:
        - formula_id: "update_theta"
          latex: "\\theta_{t+1}=\\theta_t-\\eta\\nabla L(\\theta_t)"
          spoken_explanation: "theta 是全部参数，梯度向量告诉每个参数应该如何局部调整。"
      visual_intent: "用同一个训练闭环图支撑从一维到多参数的迁移。"
      notes: "这里不展开反向传播细节，只讲训练循环里的角色映射。"
    - slide_id: "S07"
      slide_type: "recap"
      title: "这节课真正要带走的三件事"
      teaching_purpose: "用讲义型总结页收束核心概念和误区。"
      layout: "two_column"
      content_blocks:
        - block_id: "S07-B"
          kind: "bullet_list"
          items:
            - "loss：衡量当前参数错得多严重。"
            - "gradient：告诉当前位置附近往哪改最敏感。"
            - "eta：控制每一步更新的尺度。"
        - block_id: "S07-C"
          kind: "callout"
          text: "边界：本章只解释局部下降机制，不承诺非凸问题一定到达全局最优。"
        - block_id: "S07-D"
          kind: "diagram"
          asset_id: "parameter_update"
          caption: "把三个概念放回同一条参数更新链。"
      reveal_steps:
        - step_id: "S07-R1"
          kind: "bullet_list"
          target_ref: "S07-B"
        - step_id: "S07-R2"
          kind: "callout"
          target_ref: "S07-C"
        - step_id: "S07-R3"
          kind: "diagram"
          target_ref: "S07-D"
      formula_spec: []
      visual_intent: "左侧总结，右侧映射图，明确数学边界。"
      notes: "收束时不要引入 Adam、RMSProp 或反向传播细节。"
    - slide_id: "S08"
      slide_type: "exercise"
      title: "课堂检查：先算一步，再解释曲线"
      teaching_purpose: "用计算题和实验观察区分会背公式和真正理解。"
      layout: "code_result"
      content_blocks:
        - block_id: "S08-P"
          kind: "paragraph"
          text: "给定 w0=0、eta=0.1，先手算第一步更新，再打开 notebook 对照不同 eta 的曲线。能把数值、公式和图像说成同一件事，才算真正理解。"
        - block_id: "S08-F"
          kind: "formula"
          formula_ref: "first_step"
        - block_id: "S08-Out"
          kind: "output_block"
          text: "预期答案：w1 = 0.6。因为当前位置导数为负，减去负数会让 w 增大。"
        - block_id: "S08-Plot"
          kind: "plot"
          asset_id: "learning_rate_trajectories"
          caption: "让学生用曲线解释学习率，而不是只背更新公式。"
      reveal_steps:
        - step_id: "S08-R1"
          kind: "paragraph"
          target_ref: "S08-P"
        - step_id: "S08-R2"
          kind: "formula"
          target_ref: "S08-F"
        - step_id: "S08-R3"
          kind: "output_block"
          target_ref: "S08-Out"
        - step_id: "S08-R4"
          kind: "plot"
          target_ref: "S08-Plot"
      formula_spec:
        - formula_id: "first_step"
          latex: "w_1=0-0.1\\times 2(0-3)=0.6"
          spoken_explanation: "这一步把导数符号、负梯度方向和学习率三者联系起来。"
      visual_intent: "练习页同时给出题目、公式、答案解释和实验图，便于课后复习。"
      notes: "可以先遮住答案解释，让学生口头说出为什么 w 会变大。"
